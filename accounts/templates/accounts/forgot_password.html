{% extends "base.html" %}

{% block content %}

<div class="container mt-5">
       <div class="forgot-wrapper">

<h3>Forgot Password</h3>

<form method="POST">
{% csrf_token %}

<input type="email"
       name="email"
       class="form-control mb-3"
       placeholder="Enter your email"
       required>

<button class="btn btn-primary">
Send OTP
</button>

</form>

</div>
</div>

<style>

/* PAGE WRAPPER */

.forgot-wrapper{
max-width:420px;
margin:auto;
background:#fff;
padding:35px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.forgot-wrapper h3{
font-weight:600;
margin-bottom:20px;
text-align:center;
}

.forgot-wrapper input{
height:45px;
border-radius:6px;
}

.forgot-wrapper button{
width:100%;
height:45px;
font-weight:500;
border-radius:6px;
}


/* MOBILE */

@media (max-width:768px){

.forgot-wrapper{
padding:25px;
}

}

@media (max-width:480px){

.forgot-wrapper{
padding:20px;
}

.forgot-wrapper h3{
font-size:20px;
}

}

</style>

{% endblock %}
