{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

<h3>Reset Password</h3>

<form method="POST">
{% csrf_token %}

<input type="password"
       name="password"
       class="form-control mb-3"
       placeholder="Enter new password"
       required>

<button class="btn btn-primary">
Reset Password
</button>

</form>

</div>

{% endblock %}
