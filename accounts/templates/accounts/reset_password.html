{% extends "base.html" %}

{% block content %}

<div class="container mt-5">
       <div class="reset-wrapper">

<h3>Reset Password</h3>

<form method="POST">
{% csrf_token %}

<input type="password"
       name="password"
       class="form-control mb-3"
       placeholder="Enter new password"
       required>

<button class="btn btn-primary">
Reset Password
</button>

</form>

</div>
</div>

<style>

.reset-wrapper{
max-width:420px;
margin:auto;
background:white;
padding:35px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.reset-wrapper h3{
text-align:center;
margin-bottom:20px;
}

.reset-wrapper input{
height:45px;
border-radius:6px;
}

.reset-wrapper button{
width:100%;
height:45px;
border-radius:6px;
}


/* MOBILE */

@media (max-width:768px){

.reset-wrapper{
padding:25px;
}

}

@media (max-width:480px){

.reset-wrapper{
padding:20px;
}

}

</style>

{% endblock %}
