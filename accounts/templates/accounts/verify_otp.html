{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

<h3>Verify OTP</h3>

<form method="POST">
{% csrf_token %}

<input type="text"
       name="otp"
       class="form-control mb-3"
       placeholder="Enter OTP"
       required>

<button class="btn btn-success">
Verify OTP
</button>

</form>

</div>

{% endblock %}
