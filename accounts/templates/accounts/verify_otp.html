{% extends "base.html" %}

{% block content %}

<div class="container mt-5">
       <div class="otp-wrapper">

<h3>Verify OTP</h3>

<form method="POST">
{% csrf_token %}

<input type="text"
       name="otp"
       class="form-control mb-3"
       placeholder="Enter OTP"
       required>

<button class="btn btn-success">
Verify OTP
</button>

</form>

</div>
</div>

<style>

.otp-wrapper{
max-width:420px;
margin:auto;
background:white;
padding:35px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
text-align:center;
}

.otp-wrapper h3{
margin-bottom:20px;
font-weight:600;
}

.otp-wrapper input{
height:45px;
border-radius:6px;
text-align:center;
letter-spacing:4px;
font-size:18px;
}

.otp-wrapper button{
width:100%;
height:45px;
border-radius:6px;
}


/* MOBILE */

@media (max-width:768px){

.otp-wrapper{
padding:25px;
}

}

@media (max-width:480px){

.otp-wrapper{
padding:20px;
}

}

</style>

{% endblock %}
