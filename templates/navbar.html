{% load static %}

<!-- TOP BAR -->
<div class="top-bar">
<div class="container d-flex justify-content-between">
<div>
📞 +91-1234567890
&nbsp;&nbsp;
✉ support@petpalooza.com
</div>
</div>
</div>

<!-- MAIN NAVBAR -->
<nav class="main-navbar">

<div class="container nav-wrapper">

<!-- MOBILE HAMBURGER -->
<button class="menu-toggle" onclick="toggleMenu()">
<i class="bi bi-list"></i>
</button>

<!-- LOGO -->
<a class="navbar-brand" href="{% url 'accounts:home' %}">
<img src="{% static 'images/logo.png' %}" height="80">
</a>

<!-- SEARCH -->
<form class="search-bar"
method="GET"
action="{% url 'accounts:search' %}">

<input type="search"
name="q"
placeholder="Search for products..."
value="{{ request.GET.q }}">

</form>

<!-- RIGHT LINKS -->
<div class="nav-links" id="navLinks">

<a href="{% url 'accounts:home' %}">Home</a>
<a href="{% url 'about' %}">About</a>
<a href="{% url 'accounts:contact' %}">Contact</a>

{% if user.is_authenticated %}

<div class="dropdown">
<a class="nav-icon dropdown-toggle"
href="#"
data-bs-toggle="dropdown">

<i class="bi bi-person-circle"></i>
{{ user.first_name }}

</a>

<ul class="dropdown-menu dropdown-menu-end">

<li>
<a class="dropdown-item"
href="{% url 'accounts:account' %}">
My Account
</a>
</li>

<li><hr class="dropdown-divider"></li>

<li>
<form action="{% url 'accounts:logout' %}" method="post">
{% csrf_token %}
<button class="dropdown-item border-0 bg-transparent">
Logout
</button>
</form>
</li>

</ul>
</div>

{% else %}

<a href="{% url 'accounts:login' %}" class="nav-icon">
<i class="bi bi-person"></i> Log In
</a>

{% endif %}

<!-- CART -->
<a href="{% url 'cart_page' %}" class="nav-icon cart-icon">
<i class="bi bi-cart"></i>

<span class="cart-badge">
{{ cart_count }}
</span>

</a>

</div>

</div>

</nav>

{% include "category-menu.html" %}


<script>

function toggleMenu(){
document.getElementById("navLinks").classList.toggle("active");
}

</script>
